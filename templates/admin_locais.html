<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin - Locais</title>
</head>
<body>
    <h1>Locais cadastrados</h1>
    {% if locais %}
        <ul>
        {% for l in locais %}
            <li>{{ l.nome }} - {{ l.endereco }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>Nenhum local cadastrado ainda.</p>
    {% endif %}
</body>
</html>

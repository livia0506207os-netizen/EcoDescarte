{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}
{% block content %}
<h1>Locais cadastrados</h1>
{% if locais %}
    <ul>
    {% for l in locais %}
        <li>{{ l.nome }} - {{ l.endereco }}</li>
    {% endfor %}
    </ul>
{% else %}
    <p>Nenhum local cadastrado ainda.</p>
{% endif %}
{% endblock %}

{% extends "base.html" %}
{% block title %}Agendar Coleta{% endblock %}
{% block content %}
<section>
    <h2>Agendar Coleta</h2>
    <form method="POST">
        <label>Usuário:</label>
        <select name="usuario_id" required>
            {% for u in usuarios %}
            <option value="{{ u.id }}">{{ u.nome }}</option>
            {% endfor %}
        </select>
        <br><br>

        <label>Tipo de coleta:</label>
        <select name="tipo" required>
            <option value="Eletrônicos">Eletrônicos</option>
            <option value="Plásticos">Plásticos</option>
            <option value="Móveis">Móveis</option>
        </select>
        <br><br>

        <label>Local da coleta:</label>
        <select name="local" required>
            {% for l in locais %}
            <option value="{{ l.nome }}">{{ l.nome }}</option>
            {% endfor %}
        </select>
        <br><br>

        <label>Data:</label>
        <input type="date" name="data" required>
        <br><br>

        <button type="submit">Agendar</button>
    </form>
</section>
{% endblock %}

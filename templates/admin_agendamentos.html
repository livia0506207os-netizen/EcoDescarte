{% extends "base.html" %}
{% block title %}Admin - Agendamentos{% endblock %}
{% block content %}
<section class="admin-section">
    <h2>Agendamentos realizados</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th><th>Nome</th><th>Email</th><th>Data</th><th>Local</th>
            </tr>
        </thead>
        <tbody>
            {% for a in agendamentos %}
            <tr>
                <td>{{ a.id }}</td>
                <td>{{ a.nome }}</td>
                <td>{{ a.email }}</td>
                <td>{{ a.data }}</td>
                <td>{{ a.local }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
{% endblock %}

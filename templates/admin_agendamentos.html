{% extends "base.html" %}
{% block content %}
<h1>Admin Agendamentos</h1>
<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Data</th>
        <th>Local</th>
        <th>Ações</th>
    </tr>
    {% for agendamento in agendamentos %}
    <tr>
        <td>{{ agendamento.id }}</td>
        <td>{{ agendamento.nome }}</td>
        <td>{{ agendamento.email }}</td>
        <td>{{ agendamento.data }}</td>
        <td>{{ agendamento.local }}</td>
        <td>
            <form action="{{ url_for('delete_agendamento', id=agendamento.id) }}" method="POST" style="display:inline;">
                <button type="submit" onclick="return confirm('Tem certeza que deseja excluir este agendamento?')">Excluir</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

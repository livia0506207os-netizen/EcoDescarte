<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin - Agendamentos</title>
</head>
<body>
    <h1>Agendamentos</h1>
    {% if agendamentos %}
        <ul>
        {% for a in agendamentos %}
            <li>{{ a.nome }} - {{ a.email }} - {{ a.data }} - {{ a.local }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>Nenhum agendamento realizado ainda.</p>
    {% endif %}
</body>
</html>

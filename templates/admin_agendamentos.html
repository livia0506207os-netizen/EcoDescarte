{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}
{% block content %}
<h1>Agendamentos</h1>
<ul>
    {% for a in agendamentos %}
        <li>{{ a.nome }} - {{ a.email }} - {{ a.data }} - {{ a.local }}</li>
    {% endfor %}
</ul>
{% endblock %}

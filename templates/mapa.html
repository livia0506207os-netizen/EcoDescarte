{% extends "base.html" %}

{% block content %}
<h2>Mapa de Ecopontos</h2>
<div id="map"></div>
{% endblock %}

{% block extra_css %}
<style>
  #map {
    height: 500px;
    width: 100%;
    border: 2px solid #4CAF50;
    border-radius: 8px;
    margin-top: 20px;
  }
</style>
{% endblock %}

{% block extra_js %}
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Recebe os locais do Flask já convertidos em JSON
  const locais = {{ locais | tojson | safe }};

  const map = L.map('map').setView([-22.565, -47.400], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  locais.forEach(local => {
    L.marker([local.latitude, local.longitude])
      .addTo(map)
      .bindPopup(`<b>${local.nome}</b><br>${local.endereco}`);
  });
</script>
{% endblock %}

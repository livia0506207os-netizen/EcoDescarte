{% extends "base.html" %}
{% block title %}Admin - Usuários{% endblock %}
{% block content %}
<section class="admin-section">
    <h2>Usuários cadastrados</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th><th>Nome</th><th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.nome }}</td>
                <td>{{ u.email }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
{% endblock %}

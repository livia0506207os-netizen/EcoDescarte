{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}
{% block content %}
<h1>Usuários cadastrados</h1>
{% if usuarios %}
    <ul>
    {% for u in usuarios %}
        <li>{{ u.nome }} - {{ u.email }}</li>
    {% endfor %}
    </ul>
{% else %}
    <p>Nenhum usuário cadastrado ainda.</p>
{% endif %}
{% endblock %}

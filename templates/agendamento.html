{% extends "base.html" %}
{% block title %}Agendamento{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='agendamentos.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
{% endblock %}

{% block content %}
<section class="form-section">
    <h2>Agendamento de Descarte</h2>
    <form method="POST">
        <input type="text" name="nome" placeholder="Nome completo" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="date" name="data" required>
        <select name="local" required>
            <option value="">Selecione o local</option>
            {% for l in locais %}
                <option value="{{ l.nome }}">{{ l.nome }} - {{ l.endereco }}</option>
            {% endfor %}
        </select>
        <button type="submit">Agendar</button>
    </form>
</section>

<section class="map-section">
    <h3>Pontos de coleta</h3>
    <div id="map"></div>
</section>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    var locais = JSON.parse('{{ locais_json|safe }}');
    var map = L.map('map').setView([-22.566, -47.400], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    locais.forEach(function(l) {
        if (l.latitude && l.longitude) {
            L.marker([l.latitude, l.longitude]).addTo(map)
                .bindPopup("<strong>" + l.nome + "</strong><br>" + l.endereco);
        }
    });

    var bounds = locais.filter(l => l.latitude && l.longitude).map(l => [l.latitude, l.longitude]);
    if (bounds.length > 0) map.fitBounds(bounds);
</script>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<h1>Agendamento</h1>
<form method="POST">
    Nome: <input type="text" name="nome"><br>
    Email: <input type="email" name="email"><br>
    Data: <input type="text" name="data"><br>
    Local:
    <select name="local">
        {% for l in locais %}
            <option value="{{ l.nome }}">{{ l.nome }}</option>
        {% endfor %}
    </select><br>
    <button type="submit">Agendar</button>
</form>
{% endblock %}
